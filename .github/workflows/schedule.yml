name: 定时分析（自动演示）

on:
  schedule:
    - cron: "0 22 * * 1,3,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 运行标准流程（内置样本数据演示，非实时开奖）
        run: |
          python scripts/analyze.py
          python scripts/zone_check.py
          python scripts/back_rule.py
          python scripts/select_ref.py
          python scripts/final_numbers.py
          python scripts/dlt_maxcover.py
          python scripts/dlt_review.py
      - name: 回写结果（仅 csv/json）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.csv' '*.json'
          git commit -m "chore: 自动运行分析（内置样本数据演示）$(date +%F)" || echo "no changes"
          git push
